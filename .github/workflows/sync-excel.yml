name: Sync Excel from Google Drive

on:
  schedule:
    # Runs daily at 2:00 AM UTC = 10:00 PM EDT / 9:00 PM EST
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allows manual trigger from Actions tab or dashboard button

permissions:
  contents: write

jobs:
  sync-excel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Google Auth library
        run: pip install google-auth google-auth-httplib2 google-api-python-client --quiet

      - name: Download Excel from Google Drive
        env:
          GDRIVE_SERVICE_ACCOUNT_KEY: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_KEY }}
        run: |
          python3 - <<'EOF'
          import os
          import json
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaIoBaseDownload
          import io

          FILE_ID = '1QZCj7cO6gRMyNBn-cuMAxjzhIEH7QGx1'
          OUTPUT_PATH = '2026_Family_Budget.xlsx'

          # Load service account credentials from secret
          key_data = json.loads(os.environ['GDRIVE_SERVICE_ACCOUNT_KEY'])
          credentials = service_account.Credentials.from_service_account_info(
            key_data,
            scopes=['https://www.googleapis.com/auth/drive.readonly']
          )

          # Build Drive API client
          service = build('drive', 'v3', credentials=credentials)

          # Download the file
          request = service.files().get_media(fileId=FILE_ID)
          buf = io.BytesIO()
          downloader = MediaIoBaseDownload(buf, request)

          done = False
          while not done:
            status, done = downloader.next_chunk()
            print(f'Download progress: {int(status.progress() * 100)}%')

          # Write to repo
          with open(OUTPUT_PATH, 'wb') as f:
            f.write(buf.getvalue())

          size = os.path.getsize(OUTPUT_PATH)
          print(f'Downloaded {OUTPUT_PATH} — {size:,} bytes')
          EOF

      - name: Commit Excel file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 2026_Family_Budget.xlsx
          git diff --staged --quiet || git commit -m "Sync Excel from Google Drive $(date -u '+%Y-%m-%d')"
          git push
