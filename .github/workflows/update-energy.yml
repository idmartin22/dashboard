name: Update Energy Rates

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-energy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install google-auth google-auth-httplib2 google-api-python-client --quiet

      - name: Fetch energy CSVs and update prices.json
        env:
          GDRIVE_SERVICE_ACCOUNT_KEY: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_KEY }}
        run: |
          python3 - <<'EOF'
          import os, json, io, csv, re
          import urllib.request
          from datetime import datetime, timezone
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaIoBaseDownload

          FOLDER_ID = '1KEF9VD2O8SB6HeOGRtJmD_F28SZ7dWHd'

          key_data = json.loads(os.environ['GDRIVE_SERVICE_ACCOUNT_KEY'])
          credentials = service_account.Credentials.from_service_account_info(
            key_data, scopes=['https://www.googleapis.com/auth/drive.readonly']
          )
          service = build('drive', 'v3', credentials=credentials)

          def get_latest_file(folder_id, keyword):
            results = service.files().list(
              q=f"'{folder_id}' in parents and name contains '{keyword}' and trashed=false",
              orderBy='modifiedTime desc',
              fields='files(id,name,modifiedTime)',
              pageSize=5
            ).execute()
            files = results.get('files', [])
            if not files:
              print(f'No {keyword} file found')
              return None
            print(f'Found: {files[0]["name"]}')
            return files[0]['id']

          def download_file(file_id):
            request = service.files().get_media(fileId=file_id)
            buf = io.BytesIO()
            downloader = MediaIoBaseDownload(buf, request)
            done = False
            while not done:
              _, done = downloader.next_chunk()
            return buf.getvalue().decode('utf-8-sig')

          def parse_offers(csv_text):
            reader = csv.DictReader(io.StringIO(csv_text))
            rows = list(reader)
            filtered = []
            for r in rows:
              try:
                if (r['RateType'].strip().lower() == 'fixed' and
                    float(r['EarlyTerminationFee']) == 0 and
                    float(r['MonthlyFee']) == 0 and
                    r['IsIntroductoryOffer'].strip().lower() == 'no'):
                  filtered.append(r)
              except:
                continue
            print(f'  Qualifying: {len(filtered)} of {len(rows)}')
            buckets = {'3':[],'6':[],'12':[],'18_24':[],'36plus':[]}
            for r in filtered:
              try:
                term = int(r['TermLength'])
                price = float(r['Price'])
                supplier = r['SupplierCompanyName'].strip()
                entry = {'rate': price, 'supplier': supplier, 'term': term}
                if term <= 3: buckets['3'].append(entry)
                elif term <= 6: buckets['6'].append(entry)
                elif term <= 12: buckets['12'].append(entry)
                elif term <= 24: buckets['18_24'].append(entry)
                else: buckets['36plus'].append(entry)
              except:
                continue
            result = {}
            for key, offers in buckets.items():
              if offers:
                best = min(offers, key=lambda x: x['rate'])
                result[key] = {'rate': round(best['rate'] * 100, 4), 'supplier': best['supplier'], 'term': best['term']}
              else:
                result[key] = None
            return result

          def fetch_electric_ptc():
            try:
              url = 'https://energychoice.ohio.gov/ApplesToApplesComparision.aspx?Category=Electric&TerritoryId=7&RateCode=1'
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=10) as r:
                html = r.read().decode('utf-8', errors='ignore')
              match = re.search(r'price of \$?([\d.]+) per kWh', html, re.IGNORECASE)
              if match:
                ptc = float(match.group(1))
                if ptc < 1: ptc = round(ptc * 100, 3)
                print(f'  Electric PTC: {ptc}¢/kWh')
                return ptc
            except Exception as e:
              print(f'  PTC fetch failed: {e}')
            return None

          def fetch_gas_sco():
            try:
              url = 'https://energychoice.ohio.gov/ApplesToApplesComparision.aspx?Category=NaturalGas&TerritoryId=8&RateCode=1'
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=10) as r:
                html = r.read().decode('utf-8', errors='ignore')
              match = re.search(r'SCO rate is \$?([\d.]+) per ccf', html, re.IGNORECASE)
              if match:
                sco = float(match.group(1))
                sco_cents = round(sco * 100, 2)
                print(f'  Gas SCO: {sco_cents}¢/ccf')
                return sco_cents
            except Exception as e:
              print(f'  SCO fetch failed: {e}')
            return None

          # Load existing prices.json
          prices = {}
          if os.path.exists('prices.json'):
            with open('prices.json') as f:
              prices = json.load(f)
          if 'energy' not in prices:
            prices['energy'] = {}

          # Electric
          print('Processing electric CSV...')
          elec_id = get_latest_file(FOLDER_ID, 'Electric')
          if elec_id:
            elec_csv = download_file(elec_id)
            elec_best = parse_offers(elec_csv)
            ptc = fetch_electric_ptc()
            prices['energy']['electric'] = {
              'reviewed': datetime.now(timezone.utc).strftime('%Y-%m-%d'),
              'ptc': ptc or 10.83,
              'best': elec_best
            }

          # Gas
          print('Processing gas CSV...')
          gas_id = get_latest_file(FOLDER_ID, 'Gas')
          if gas_id:
            gas_csv = download_file(gas_id)
            gas_best = parse_offers(gas_csv)
            sco = fetch_gas_sco()
            prices['energy']['gas'] = {
              'reviewed': datetime.now(timezone.utc).strftime('%Y-%m-%d'),
              'sco': sco or 52.9,
              'best': gas_best
            }

          with open('prices.json', 'w') as f:
            json.dump(prices, f, indent=2)

          print('\nprices.json updated:')
          print(json.dumps(prices.get('energy', {}), indent=2))
          EOF

      - name: Commit prices.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Wait 30 seconds to avoid conflicts with other concurrent workflows
          sleep 30
          git pull origin main --no-rebase
          git add prices.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update energy rates $(date -u '+%Y-%m-%d')"
          git push
