name: Update Energy Rates
 
on:
  schedule:
    # Runs daily at 2:00 AM UTC = 10:00 PM EDT / 9:00 PM EST
    - cron: '0 2 * * *'
  workflow_dispatch:
 
permissions:
  contents: write
 
jobs:
  update-energy:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Install dependencies
        run: pip install google-auth google-auth-httplib2 google-api-python-client --quiet
 
      - name: Fetch energy CSVs and update prices.json
        env:
          GDRIVE_SERVICE_ACCOUNT_KEY: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_KEY }}
        run: |
          python3 - <<'EOF'
          import os, json, io, csv
          from datetime import datetime, timezone
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaIoBaseDownload
 
          FOLDER_ID = '1KEF9VD2O8SB6HeOGRtJmD_F28SZ7dWHd'
 
          key_data = json.loads(os.environ['GDRIVE_SERVICE_ACCOUNT_KEY'])
          credentials = service_account.Credentials.from_service_account_info(
            key_data,
            scopes=['https://www.googleapis.com/auth/drive.readonly']
          )
          service = build('drive', 'v3', credentials=credentials)
 
          def get_latest_file(folder_id, keyword):
            """Find most recently modified file in folder containing keyword"""
            results = service.files().list(
              q=f"'{folder_id}' in parents and name contains '{keyword}' and trashed=false",
              orderBy='modifiedTime desc',
              fields='files(id,name,modifiedTime)',
              pageSize=5
            ).execute()
            files = results.get('files', [])
            if not files:
              print(f'No {keyword} file found in folder')
              return None
            print(f'Found {keyword} file: {files[0]["name"]} (modified {files[0]["modifiedTime"]})')
            return files[0]['id']
 
          def download_file(file_id):
            """Download file contents as string"""
            request = service.files().get_media(fileId=file_id)
            buf = io.BytesIO()
            downloader = MediaIoBaseDownload(buf, request)
            done = False
            while not done:
              _, done = downloader.next_chunk()
            return buf.getvalue().decode('utf-8-sig')
 
          def parse_offers(csv_text, rate_type='electric'):
            """Parse CSV and return best rate per term bucket meeting filter criteria"""
            reader = csv.DictReader(io.StringIO(csv_text))
            rows = list(reader)
            print(f'Total {rate_type} offers: {len(rows)}')
 
            # Apply filters: fixed, $0 cancel, $0 monthly fee, no intro offer
            filtered = []
            for r in rows:
              try:
                rate_type_val = r.get('RateType','').strip().lower()
                cancel_fee = float(r.get('EarlyTerminationFee', 1) or 1)
                monthly_fee = float(r.get('MonthlyFee', 1) or 1)
                intro = r.get('IsIntroductoryOffer','').strip().lower()
                if rate_type_val == 'fixed' and cancel_fee == 0 and monthly_fee == 0 and intro == 'no':
                  filtered.append(r)
              except:
                continue
 
            print(f'Qualifying {rate_type} offers: {len(filtered)}')
 
            # Group into term buckets and find best in each
            buckets = {'3': [], '6': [], '12': [], '18_24': [], '36plus': []}
            for r in filtered:
              try:
                term = int(r.get('TermLength', 0))
                price = float(r.get('Price', 999))
                supplier = r.get('SupplierCompanyName', '').strip()
                entry = {'rate': price, 'supplier': supplier, 'term': term}
                if term <= 3:
                  buckets['3'].append(entry)
                elif term <= 6:
                  buckets['6'].append(entry)
                elif term <= 12:
                  buckets['12'].append(entry)
                elif term <= 24:
                  buckets['18_24'].append(entry)
                else:
                  buckets['36plus'].append(entry)
              except:
                continue
 
            result = {}
            for key, offers in buckets.items():
              if offers:
                best = min(offers, key=lambda x: x['rate'])
                result[key] = {
                  'rate': round(best['rate'] * 100, 3),
                  'supplier': best['supplier'],
                  'term': best['term']
                }
              else:
                result[key] = None
 
            return result
 
          def fetch_ptc(service_type='electric'):
            """Fetch Price to Compare from Apples to Apples page"""
            import urllib.request
            try:
              url = 'https://energychoice.ohio.gov/ApplesToApplesComparision.aspx?Category=Electric&TerritoryId=7&RateCode=1'
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=10) as r:
                html = r.read().decode('utf-8', errors='ignore')
              import re
              # Ohio Edison PTC pattern: "$0.XXXX per kWh" or "X.XX cents per KWH"
              match = re.search(r'price of \$?([\d.]+) per kWh', html, re.IGNORECASE)
              if match:
                ptc = float(match.group(1))
                # Convert to cents if in dollars
                if ptc < 1:
                  ptc = round(ptc * 100, 3)
                print(f'Ohio Edison PTC: {ptc}¢/kWh')
                return ptc
            except Exception as e:
              print(f'PTC fetch failed: {e}')
            return None
 
          # Load existing prices.json
          prices = {}
          if os.path.exists('prices.json'):
            with open('prices.json') as f:
              prices = json.load(f)
 
          # Initialize energy section
          if 'energy' not in prices:
            prices['energy'] = {}
 
          # Process electric CSV
          elec_id = get_latest_file(FOLDER_ID, 'Electric')
          if elec_id:
            elec_csv = download_file(elec_id)
            elec_best = parse_offers(elec_csv, 'electric')
            ptc = fetch_ptc()
            prices['energy']['electric'] = {
              'reviewed': datetime.now(timezone.utc).strftime('%Y-%m-%d'),
              'ptc': ptc or 10.83,
              'best': elec_best
            }
            print(f'Electric best rates: {elec_best}')
 
          # Process gas CSV
          gas_id = get_latest_file(FOLDER_ID, 'Gas')
          if gas_id:
            gas_csv = download_file(gas_id)
            gas_best = parse_offers(gas_csv, 'gas')
            prices['energy']['gas'] = {
              'reviewed': datetime.now(timezone.utc).strftime('%Y-%m-%d'),
              'best': gas_best
            }
            print(f'Gas best rates: {gas_best}')
 
          # Write updated prices.json
          with open('prices.json', 'w') as f:
            json.dump(prices, f, indent=2)
 
          print('\nprices.json updated with energy data')
          print(json.dumps(prices.get('energy', {}), indent=2))
          EOF
 
      - name: Commit prices.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --no-rebase
          git add prices.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update energy rates $(date -u '+%Y-%m-%d')"
          git push
